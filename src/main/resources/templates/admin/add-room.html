<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Room — Grand Vista Hotel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a class="brand" th:href="@{/}">Grand Vista Hotel</a>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/rooms}">Rooms</a>
        <a th:href="@{/admin/reports}">Reports</a>
        <a th:href="@{/admin/logout}">Logout</a>
    </div>
</nav>

<div class="container" style="max-width:480px;">
    <div class="card">
        <h2>Add Room</h2>
        <p th:if="${error}" class="error" th:text="${error}"></p>
        <form th:action="@{/admin/rooms/add}" method="post">
            <div>
                <label>Room Number</label>
                <input type="number" name="roomNo" required>
            </div>
            <div>
                <label>Room Type</label>
                <select name="roomType" required>
                    <option value="Single">Single</option>
                    <option value="Double">Double</option>
                    <option value="Deluxe">Deluxe</option>
                    <option value="Suite">Suite</option>
                </select>
            </div>
            <div>
                <label>Price per night (₹)</label>
                <input type="number" step="0.01" name="price" required>
            </div>
            <div>
                <label>Status</label>
                <select name="status" required>
                    <option value="Available">Available</option>
                    <option value="Booked">Booked</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Add Room</button>
        </form>
    </div>
</div>

</body>
</html>
