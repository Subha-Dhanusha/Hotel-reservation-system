<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reports — Grand Vista Hotel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a class="brand" th:href="@{/}">Grand Vista Hotel</a>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/rooms}">Rooms</a>
        <a th:href="@{/admin/reports}">Reports</a>
        <a th:href="@{/admin/logout}">Logout</a>
    </div>
</nav>

<div class="container">
    <h1>Reports</h1>
    <div class="grid">
        <div class="stat"><div class="value" th:text="${totalRooms}"></div><div class="label">Total Rooms</div></div>
        <div class="stat"><div class="value" th:text="${availableRooms}"></div><div class="label">Available</div></div>
        <div class="stat"><div class="value" th:text="${bookedRooms}"></div><div class="label">Booked</div></div>
        <div class="stat"><div class="value" th:text="${totalCustomers}"></div><div class="label">Customers</div></div>
        <div class="stat"><div class="value" th:text="${totalBookings}"></div><div class="label">Bookings</div></div>
        <div class="stat"><div class="value">₹<span th:text="${#numbers.formatDecimal(totalRevenue,1,2)}"></span></div><div class="label">Total Revenue</div></div>
    </div>
</div>

</body>
</html>
