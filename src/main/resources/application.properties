spring.application.name=hotel-web

# Database - reads from environment variables in production (Render),
# falls back to local MySQL defaults for local development
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hotel_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning - keep small since free-tier MySQL plans
# (e.g. Aiven's free plan) have limited max connections
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# Thymeleaf
spring.thymeleaf.cache=true

# Server port - Render injects PORT env var
server.port=${PORT:8080}
